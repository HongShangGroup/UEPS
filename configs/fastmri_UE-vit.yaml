# model related
recon_type: "unrolle"
Ncascade: 4
dc_type: "soft"
use_coil_mask: True

img_model_config:
  model_type: vitsparse
  coildim_type: "as_batch"
  input_norm: False
  use_res: True
  posemb_type: none
  patch_size: 8
  width: 512
  heads: 8
  layers: 10
  intermediate_size: 1280
  q_bias: True
  k_bias: True
  v_bias: True
  proj_bias: True
  eps: 1e-05
  use_rope: True
  use_swiglu: True
  use_qknorm: False
  use_rmsnorm: False

# train related
loss_type_train: "mae"
loss_type_eval: "mae"
opt_type: "adam"
lrs_type: "cos1"
epochs: 30
lr: 0.0003
resume_from: ""
continue_opt: False
use_ac: False
use_compile: True
precision_type: "amp"
accmu_steps: 1

# test related
escale: 10.0
batch2plot: 10
eval_use_amp: True
